name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest

  dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
        working-directory: pipeline
      - name: Validate the published dataset
        run: uv run transporte-sp validate
        working-directory: pipeline

  site:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx astro check
      - name: Build
        run: npm run build
      # Almost every page is generated, so a link is never wrong once — an off-by-one in
      # how they are written breaks hundreds at a time and no other check sees it.
      - name: Check internal links
        run: npm run check:links

  generated-content-is-current:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --dev
        working-directory: pipeline
      - name: Regenerate the site content from the dataset
        run: uv run transporte-sp pages
        working-directory: pipeline
      - name: Fail if the committed pages differ from the dataset
        run: |
          if ! git diff --quiet; then
            echo "The generated pages are out of date. Run 'uv run transporte-sp pages'."
            git diff --stat
            exit 1
          fi
